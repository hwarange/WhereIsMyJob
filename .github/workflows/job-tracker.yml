name: Collect AI job postings

on:
  schedule:
    # GitHub Actions uses UTC: 00/06/12/18 UTC = 09/15/21/03 KST.
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Collect and export dashboard data
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SARAMIN_ACCESS_KEY: ${{ secrets.SARAMIN_ACCESS_KEY }}
        run: |
          set -euo pipefail
          cp config.example.yaml config.yaml
          python job_tracker.py --config config.yaml --export-json docs/data/jobs.json 2>&1 | tee tracker.log

      - name: Commit updated jobs
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- docs/data/jobs.json; then
            echo "No job data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs.json
          git commit -m "chore: update job dashboard data"
          git push

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: job-tracker-log
          path: tracker.log
