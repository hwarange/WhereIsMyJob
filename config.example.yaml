timezone: Asia/Seoul

filter:
  # true면 신입/Junior/Entry/경력무관 키워드가 반드시 있어야 합니다.
  strict_entry_level: false
  min_score: 6
  # 생략하면 코드의 기본 규칙을 사용합니다. Search_Rules 시트로 운영 규칙을 관리할 수도 있습니다.

sources:
  saramin_api:
    # 사용하지 않으므로 기본 비활성화. 필요할 때만 true로 변경합니다.
    enabled: false
    url: https://oapi.saramin.co.kr/job-search
    count_per_keyword: 50
    keywords:
      - "AI Engineer 신입"
      - "머신러닝 신입"
      - "딥러닝 신입"
      - "LLM 신입"
      - "MLOps 신입"
      - "NLP 신입"
      - "Computer Vision 신입"
      - "Data Scientist 신입"

  jasoseol:
    enabled: true
    url: https://jasoseol.com/search
    use_playwright: true
    keywords:
      - AI
      - 머신러닝
      - 딥러닝
      - LLM
      - MLOps
    request_delay_sec: 1.5

  jobkorea:
    enabled: true
    url: https://www.jobkorea.co.kr/
    use_playwright: false
    keywords:
      - "AI Engineer 신입"
      - "머신러닝 신입"
      - "딥러닝 신입"
      - "LLM 신입"
    request_delay_sec: 1.5

  jumpit:
    enabled: true
    url: https://jumpit.saramin.co.kr/
    use_playwright: true
    keywords:
      - AI
      - ML
      - LLM
      - MLOps
      - 머신러닝
    request_delay_sec: 1.5

  company_sites:
    enabled: true
    # true면 Google Sheets의 Company_Targets가 config targets보다 우선합니다.
    from_sheet: true
    use_playwright: true
    request_delay_sec: 2.0
    targets:
      - company: 삼성전자
        enabled: true
        url: https://www.samsungcareers.com/
        query_hint: AI 신입
      - company: LG
        enabled: true
        url: https://careers.lg.com/
        query_hint: AI 신입
      - company: SK
        enabled: true
        url: https://www.skcareers.com/
        query_hint: AI 신입
      - company: 현대자동차
        enabled: true
        url: https://talent.hyundai.com/
        query_hint: AI 신입
      - company: 네이버
        enabled: true
        url: https://recruit.navercorp.com/
        query_hint: AI 신입
      - company: 카카오
        enabled: true
        url: https://careers.kakao.com/
        query_hint: AI 신입
      - company: 쿠팡
        enabled: true
        url: https://www.coupang.jobs/
        query_hint: Machine Learning
      - company: 토스
        enabled: true
        url: https://toss.im/career
        query_hint: ML
      - company: 라인
        enabled: true
        url: https://careers.linecorp.com/
        query_hint: AI
      - company: 우아한형제들
        enabled: true
        url: https://career.woowahan.com/
        query_hint: AI

notifications:
  slack:
    enabled: false
