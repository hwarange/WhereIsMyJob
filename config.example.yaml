timezone: Asia/Seoul

filter:
  # true면 신입/Junior/Entry/경력무관 키워드가 반드시 있어야 합니다.
  strict_entry_level: true
  # 학력무관·고졸·초대졸·대졸·학사 등 학사 이하도 지원 가능한 공고만 표시합니다.
  allow_bachelor_or_lower: true
  min_score: 6
  # 생략하면 코드의 기본 규칙을 사용합니다. Search_Rules 시트로 운영 규칙을 관리할 수도 있습니다.

sources:
  saramin_api:
    # 공개 검색 결과 카드만 수집합니다. 상세 공고 페이지는 요청하지 않습니다.
    enabled: true
    method: public_search
    url: https://www.saramin.co.kr/zf_user/search/recruit
    keywords:
      - "AI Engineer 신입"
      - "머신러닝 신입"
      - "딥러닝 신입"
      - "LLM 신입"
      - "MLOps 신입"
      - "NLP 신입"
      - "Computer Vision 신입"
      - "Data Scientist 신입"

  jasoseol:
    enabled: true
    url: https://jasoseol.com/search
    use_playwright: true
    keywords:
      - AI
      - 머신러닝
      - 딥러닝
      - LLM
      - MLOps
    request_delay_sec: 1.5

  jobkorea:
    # robots.txt가 검색 결과 수집을 허용하지 않아 비활성화합니다.
    enabled: false
    url: https://www.jobkorea.co.kr/Search/
    use_playwright: false
    keywords:
      - "AI Engineer 신입"
      - "머신러닝 신입"
      - "딥러닝 신입"
      - "LLM 신입"
    request_delay_sec: 1.5

  jumpit:
    enabled: true
    url: https://jumpit.saramin.co.kr/positions?integrated=true
    use_playwright: true
    render_wait_ms: 3000
    # 목록에 없는 학력 조건을 상세 공고에서 확인합니다.
    detail_fetch_limit: 80
    keywords:
      - AI
      - ML
      - LLM
      - MLOps
      - 머신러닝
    request_delay_sec: 1.5

  company_sites:
    # 일반 메뉴/유튜브/FAQ 링크는 수집하지 않고, JobPosting 데이터 또는
    # 상세공고 URL 패턴이 확인된 링크만 수집합니다.
    enabled: true
    # true면 Google Sheets의 Company_Targets가 config targets보다 우선합니다.
    from_sheet: true
    use_playwright: true
    request_delay_sec: 2.0
    targets:
      - company: 삼성전자
        enabled: true
        url: https://www.samsungcareers.com/
        query_hint: AI 신입
      - company: LG
        enabled: true
        url: https://careers.lg.com/
        query_hint: AI 신입
      - company: SK
        enabled: true
        url: https://www.skcareers.com/
        query_hint: AI 신입
      - company: 현대자동차
        enabled: true
        url: https://talent.hyundai.com/
        query_hint: AI 신입
      - company: 네이버
        enabled: true
        url: https://recruit.navercorp.com/
        query_hint: AI 신입
      - company: 카카오
        enabled: true
        url: https://careers.kakao.com/
        query_hint: AI 신입
      - company: 쿠팡
        enabled: true
        url: https://www.coupang.jobs/
        query_hint: Machine Learning
      - company: 토스
        enabled: true
        url: https://toss.im/career
        query_hint: ML
      - company: 라인
        enabled: true
        url: https://careers.linecorp.com/
        query_hint: AI
      - company: 우아한형제들
        enabled: true
        url: https://career.woowahan.com/
        query_hint: AI

notifications:
  slack:
    enabled: false
